<html>
<head>
    <title>School Alumni Portal</title>
   <link rel="stylesheet" href="style.css">
</head>
<body id="home">
    <header> <h1 align="center">School Alumni Portal</h1></header>

    <hr>


    <table border="1" width="100%">
        <tr align="center">
            <td><a href="https://www.sbjit.edu.in/">Home</a></td>
            <td><a href="regi.html">Register</a></td>
            <td><a href="gallery.html">Gallery</a></td>
            <td><a href="donate.html">Donate</a></td>
            <td><a href="news.html">News</a></td>
        </tr>
    </table>
    <br>
    <h1 align="center">Welcomee to allumni portal</h1><br><br>
    <h3 align="center"><i>Reconect with your batchmates and realive memories</i></h3><br><br><br><br>
    <h3 align="center"><i><b>Use the navigation menu abow to access Registrartion,Donation,Gallery,etc..</b></i></h3>
    <div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">

    <div draggable="true" ondragstart="drag(event)" id="register"
        style="padding:20px; background:lightblue;">Register</div>

    <div draggable="true" ondragstart="drag(event)" id="donate"
        style="padding:20px; background:lightgreen;">Donate</div>

    <div draggable="true" ondragstart="drag(event)" id="gallery"
        style="padding:20px; background:lightcoral;">Gallery</div>

        <div draggable="true" ondragstart="drag(event)" id="gallery"
        style="padding:20px; background:lightcoral;">News</div>

</div>

<div ondrop="drop(event)" ondragover="allowDrop(event)"
     style="margin:50px auto; width:200px; height:100px; border:2px dashed black; text-align:center; line-height:100px;">
    Drop Here
</div>

<script>
function allowDrop(ev) {
    ev.preventDefault();
}

function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
    ev.preventDefault();
    var data = ev.dataTransfer.getData("text");

    if(data === "register") {
        window.location.href = "regi.html";
    }
    else if(data === "donate") {
        window.location.href = "donate.html";
    }
    else if(data === "gallery") {
        window.location.href = "gallery.html";
    }
    else if(data === "news") {
        window.location.href = "news.html";
    }
}
</script>
<footer align="center">
        <p>2026 School Alumni Portal | CS25139</p>
    </footer>
</body>
</html>
