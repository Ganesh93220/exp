<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <h1 align="center">Alumni Registration</h1>
    <form align="center">
        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Passing Year:</label><br>
        <input type="number" placeholder="Enter passing year"><br><br>

        <label>Current Profession:</label><br>
        <input type="text" placeholder="Enter profession"><br><br>

        <input type="submit" value="Register">
    </form>
    
</body>
</html>
